<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>goCPC — Noriks Google Ads</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:560px;text-align:center}
    .logo{display:inline-block;background:#F5D900;color:#000;padding:8px 16px;font-weight:900;font-size:14px;letter-spacing:2px;border-radius:4px;margin-bottom:32px}
    h1{font-size:64px;font-weight:900;letter-spacing:-2px;margin-bottom:16px}
    h1 span{color:#F5D900}
    p{font-size:18px;color:#aaa;line-height:1.5;margin-bottom:24px}
    .status{display:inline-flex;align-items:center;gap:8px;background:#1a1a1a;padding:8px 16px;border-radius:24px;font-size:13px}
    .dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:p 2s infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
    .small{font-size:13px;color:#666;margin-top:32px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">NORIKS</div>
    <h1>go<span>CPC</span></h1>
    <p>Google Ads campaign creator &amp; monitor.<br>Demo skeleton — coming soon.</p>
    <div class="status"><span class="dot"></span>App online</div>
    <div class="small">v0.1.0 · /health</div>
  </div>
</body>
</html>
