<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>goCPC — login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
    body{background:#000;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#0f0f0f;border:1px solid #1f1f1f;border-radius:16px;padding:40px;width:100%;max-width:400px}
    .logo{display:inline-block;background:#F5D900;color:#000;padding:6px 14px;font-weight:900;font-size:12px;letter-spacing:2px;border-radius:4px;margin-bottom:24px}
    h1{font-size:32px;font-weight:900;letter-spacing:-1px;margin-bottom:8px}
    h1 span{color:#F5D900}
    .sub{color:#888;font-size:14px;margin-bottom:32px}
    label{display:block;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;margin-top:16px}
    input{width:100%;background:#000;border:1px solid #2a2a2a;color:#fff;padding:14px 16px;font-size:15px;border-radius:8px;outline:none;transition:border .15s}
    input:focus{border-color:#F5D900}
    button{width:100%;background:#F5D900;color:#000;border:none;padding:14px;font-size:14px;font-weight:800;letter-spacing:1px;border-radius:8px;cursor:pointer;margin-top:24px;transition:opacity .15s}
    button:hover{opacity:.85}
    button:disabled{opacity:.4;cursor:not-allowed}
    .err{color:#ef4444;font-size:13px;margin-top:16px;display:none}
    .err.show{display:block}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">NORIKS</div>
    <h1>go<span>CPC</span></h1>
    <p class="sub">Google Ads campaign manager</p>
    <form id="f">
      <label for="user">Username</label>
      <input id="user" name="user" autocomplete="username" required>
      <label for="pass">Password</label>
      <input id="pass" name="pass" type="password" autocomplete="current-password" required>
      <button type="submit" id="btn">Sign in</button>
      <div class="err" id="err"></div>
    </form>
  </div>
  <script>
    const f=document.getElementById('f'),btn=document.getElementById('btn'),err=document.getElementById('err');
    f.addEventListener('submit',async(e)=>{
      e.preventDefault();
      err.classList.remove('show');
      btn.disabled=true;btn.textContent='Signing in...';
      try{
        const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user:f.user.value,pass:f.pass.value})});
        if(r.ok){location.href='/';return;}
        const d=await r.json();err.textContent=d.error||'Login failed';err.classList.add('show');
      }catch(e){err.textContent=e.message;err.classList.add('show');}
      btn.disabled=false;btn.textContent='Sign in';
    });
  </script>
</body>
</html>
